name: Integration Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["src/**", "tests/integration/**"]

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - "15432:5432"
        options: >-
          --health-cmd "pg_isready -U testuser"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpass
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
          MYSQL_DATABASE: testdb
        ports:
          - "13306:3306"
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_POSTGRES_URL: "postgresql://testuser:testpass@localhost:15432/testdb"
      TEST_MYSQL_URL: "mysql+mysqlconnector://testuser:testpass@localhost:13306/testdb"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev,enterprise,modern-databases]"

      - name: Run integration tests
        run: pytest tests/integration/ -v -m integration --timeout=120
