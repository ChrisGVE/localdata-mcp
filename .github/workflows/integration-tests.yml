name: Integration Tests

on:
  workflow_dispatch:
    inputs:
      full_suite:
        description: "Run full suite including NoSQL databases"
        type: boolean
        default: false
  push:
    branches: [main]
    paths: ["src/**", "tests/integration/**"]

jobs:
  # Embedded databases and file formats — no Docker needed, fast
  embedded:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-integ-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-integ-

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run smoke tests
        run: pytest tests/integration/test_smoke.py -v --timeout=30

      - name: Run SQLite tests
        run: pytest tests/integration/test_sqlite.py -v --timeout=120

      - name: Run file format tests
        run: >
          pytest
          tests/integration/test_csv_tsv_json.py
          tests/integration/test_tree_files.py
          tests/integration/test_graph_files.py
          -v --timeout=120

      - name: Run spreadsheet tests
        run: pytest tests/integration/test_spreadsheets.py -v --timeout=120

      - name: Run analytical format tests
        run: pytest tests/integration/test_analytical.py -v --timeout=120

      - name: Run RDF/SPARQL tests
        run: pytest tests/integration/test_rdf_sparql.py -v --timeout=120
        continue-on-error: true

      - name: Run edge case tests
        run: pytest tests/integration/test_file_edge_cases.py -v --timeout=120
        continue-on-error: true

  # PostgreSQL integration tests
  postgres:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - "15432:5432"
        options: >-
          --health-cmd "pg_isready -U testuser"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_POSTGRES_URL: "postgresql://testuser:testpass@localhost:15432/testdb"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev,enterprise]"

      - name: Run PostgreSQL tests
        run: pytest tests/integration/test_postgres.py -v --timeout=120
        continue-on-error: true

  # MySQL integration tests
  mysql:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpass
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
          MYSQL_DATABASE: testdb
        ports:
          - "13306:3306"
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_MYSQL_URL: "mysql+mysqlconnector://testuser:testpass@localhost:13306/testdb"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev,enterprise]"

      - name: Run MySQL tests
        run: pytest tests/integration/test_mysql.py -v --timeout=120
        continue-on-error: true

  # MS SQL Server integration tests
  mssql:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "TestPass123!"
        ports:
          - "11433:1433"
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'TestPass123!' -Q 'SELECT 1' -C -l 5"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 10

    env:
      TEST_MSSQL_URL: "mssql+pymssql://sa:TestPass123!@localhost:11433/master"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev,enterprise]"

      - name: Run MSSQL tests
        run: pytest tests/integration/test_mssql.py -v --timeout=120
        continue-on-error: true

  # NoSQL databases — only on full_suite dispatch
  nosql:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.full_suite == 'true'

    services:
      mongo:
        image: mongo:7
        ports:
          - "27017:27017"
      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev,modern-databases]"

      - name: Wait for services
        run: sleep 10

      - name: Run MongoDB tests
        run: pytest tests/integration/test_mongodb.py -v --timeout=120
        continue-on-error: true

      - name: Run Redis tests
        run: pytest tests/integration/test_redis.py -v --timeout=120
        continue-on-error: true
